<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblo · 학술정보관 MARC 자동 생성</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img src="assets/biblo-logo.png" alt="biblo">
      <span class="subtitle">학술정보관 MARC 자동 생성</span>
    </div>
    <button class="guide-btn" id="open-guide">📖 프로세스 설명서</button>
  </header>

  <nav class="stepper" id="stepper">
    <div class="node active" data-step="1"><span class="circle">1</span><span class="label">ISBN</span></div>
    <div class="line"></div>
    <div class="node" data-step="2"><span class="circle">2</span><span class="label">도서정보</span></div>
    <div class="line"></div>
    <div class="node" data-step="3"><span class="circle">3</span><span class="label">DDC</span></div>
    <div class="line"></div>
    <div class="node" data-step="4"><span class="circle">4</span><span class="label">MARC</span></div>
    <div class="line"></div>
    <div class="node" data-step="5"><span class="circle">5</span><span class="label">검수</span></div>
  </nav>

  <main class="stages">
    <section class="stage active" data-stage="1">
  <div class="panel">
    <div class="panel-h">📥 신규 도서 ISBN 입력</div>
    <div class="panel-body">
      <input type="text" id="isbn-input" class="text-input" placeholder="978-89-364-3412-0" style="margin-bottom: 14px;">
      <div class="label-sm" style="margin-bottom: 8px;">시연용 샘플 (클릭하여 자동 입력)</div>
      <div class="chip-group" id="sample-chips" style="margin-bottom: 18px;"></div>
      <div class="btn-row right">
        <button class="btn btn-primary" id="call-book-info" disabled>도서정보 호출 →</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-h">
      📊 대시보드
      <span class="meta">2026-05-06 기준 · 자동 갱신</span>
    </div>
    <div class="panel-body">
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">전체 도서</div><div class="stat-num" id="stat-total">1,483,782<span class="unit">권</span></div><div class="stat-delta">실물 + 전자 합계</div></div>
        <div class="stat"><div class="stat-label">실물책</div><div class="stat-num">714,172<span class="unit">권</span></div><div class="stat-delta">48.1%</div></div>
        <div class="stat"><div class="stat-label">전자책</div><div class="stat-num">769,610<span class="unit">권</span></div><div class="stat-delta">51.9%</div></div>
        <div class="stat"><div class="stat-label">오늘 입고</div><div class="stat-num">40<span class="unit">권</span></div><div class="stat-delta">금일 신착</div></div>
        <div class="stat indigo"><div class="stat-label">MARC 생성 완료</div><div class="stat-num" id="stat-completed">27<span class="unit">/40</span></div><div class="stat-delta warn" id="stat-rate">진행률 67.5%</div></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-h">
      ✅ 생성 완료된 MARC
      <span class="meta">최근 10건</span>
    </div>
    <table class="table">
      <thead>
        <tr>
          <th style="width:36px;"></th>
          <th>제목 / 저자</th>
          <th style="width:130px;">ISBN</th>
          <th style="width:80px;">DDC</th>
          <th style="width:100px;">처리일시</th>
          <th style="width:80px;">검수자</th>
          <th style="width:60px;">상태</th>
          <th style="width:60px; text-align:right;"></th>
        </tr>
      </thead>
      <tbody id="completed-list-body"></tbody>
    </table>
    <div class="table-footer"><a class="link" id="show-all-completed">전체 27건 보기 →</a></div>
  </div>
</section>
    <section class="stage" data-stage="2">
  <div id="stage-2-content"></div>
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="goToStep(1)">← ISBN 다시 입력</button>
    <button class="btn btn-primary" onclick="completeStep(2)">DDC 분류 매칭 →</button>
  </div>
</section>
    <section class="stage" data-stage="3">
  <div id="stage-3-content"></div>
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="goToStep(2)">← 도서정보 다시 보기</button>
    <button class="btn btn-primary" id="confirm-ddc">선택한 DDC로 확정 →</button>
  </div>
</section>
    <section class="stage" data-stage="4">
  <div id="stage-4-content"></div>
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="goToStep(3)">← DDC 다시 매칭</button>
    <button class="btn btn-primary" onclick="completeStep(4)">최종 검수 →</button>
  </div>
</section>
    <section class="stage" data-stage="5">
  <div id="stage-5-content"></div>
</section>
  </main>
  <script src="data/sample-books.js"></script>
  <script src="data/book-details.js"></script>
  <script src="data/ddc-dict.js"></script>
  <script src="data/marc-fields.js"></script>
  <script src="app.js"></script>
</body>
</html>
